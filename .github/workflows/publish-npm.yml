name: Publish amz-cli to npm

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test-and-publish:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: amz-cli
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
          cache: npm
          cache-dependency-path: amz-cli/package-lock.json

      - name: Verify tag matches package version
        if: github.ref_type == 'tag'
        env:
          RELEASE_TAG: ${{ github.ref_name }}
        run: node -e "const p=require('./package.json'); if (process.env.RELEASE_TAG !== 'v'+p.version) { throw new Error('tag '+process.env.RELEASE_TAG+' does not match package v'+p.version); }"

      - run: npm ci
      - run: npm test
      - run: npm pack --dry-run
      - run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
